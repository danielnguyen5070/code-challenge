name: Currency Swap Form CI

on:
  push:
    paths:
      - 'src/problem2/currency-swap-form/**'
      - '.github/workflows/currency-swap-form.yml'
  pull_request:
    paths:
      - 'src/problem2/currency-swap-form/**'
      - '.github/workflows/currency-swap-form.yml'

defaults:
  run:
    working-directory: src/problem2/currency-swap-form

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src/problem2/currency-swap-form/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build
